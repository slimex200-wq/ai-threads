<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Card News Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px 20px;
            max-width: 1200px; margin: 0 auto;
        }
        h1 {
            font-size: 48px; font-weight: 900;
            letter-spacing: -2px; margin-bottom: 8px;
        }
        .subtitle {
            color: #666; font-size: 18px; margin-bottom: 60px;
        }
        .date-section {
            margin-bottom: 60px;
        }
        h2 {
            font-size: 24px; font-weight: 600;
            color: #888; margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .card-link {
            display: block;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: border-color 0.2s;
        }
        .card-link:hover {
            border-color: #555;
        }
        .card-img {
            width: 100%; height: auto; display: block;
        }
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <h1>AI Card News</h1>
    <p class="subtitle">매일 자동 생성되는 AI 뉴스 카드</p>
    
        <section class="date-section">
            <h2>2026-03-21</h2>
            <div class="card-grid">
            <a href="cards/2026-03-21/card-01.png" download="card-01.png" class="card-link" data-filename="card-01.png">
                <img src="cards/2026-03-21/card-01.png" alt="card-01.png" class="card-img">
            </a>
            <a href="cards/2026-03-21/card-02.png" download="card-02.png" class="card-link" data-filename="card-02.png">
                <img src="cards/2026-03-21/card-02.png" alt="card-02.png" class="card-img">
            </a>
            <a href="cards/2026-03-21/card-03.png" download="card-03.png" class="card-link" data-filename="card-03.png">
                <img src="cards/2026-03-21/card-03.png" alt="card-03.png" class="card-img">
            </a>
            <a href="cards/2026-03-21/card-04.png" download="card-04.png" class="card-link" data-filename="card-04.png">
                <img src="cards/2026-03-21/card-04.png" alt="card-04.png" class="card-img">
            </a>
            <a href="cards/2026-03-21/card-05.png" download="card-05.png" class="card-link" data-filename="card-05.png">
                <img src="cards/2026-03-21/card-05.png" alt="card-05.png" class="card-img">
            </a>
            <a href="cards/2026-03-21/card-06.png" download="card-06.png" class="card-link" data-filename="card-06.png">
                <img src="cards/2026-03-21/card-06.png" alt="card-06.png" class="card-img">
            </a>
            </div>
        </section>
        <section class="date-section">
            <h2>2026-03-20</h2>
            <div class="card-grid">
            <a href="cards/2026-03-20/card-01.png" download="card-01.png" class="card-link" data-filename="card-01.png">
                <img src="cards/2026-03-20/card-01.png" alt="card-01.png" class="card-img">
            </a>
            <a href="cards/2026-03-20/card-02.png" download="card-02.png" class="card-link" data-filename="card-02.png">
                <img src="cards/2026-03-20/card-02.png" alt="card-02.png" class="card-img">
            </a>
            <a href="cards/2026-03-20/card-03.png" download="card-03.png" class="card-link" data-filename="card-03.png">

            </a>
            <a href="cards/2026-03-20/card-04.png" download="card-04.png" class="card-link" data-filename="card-04.png">

            </a>
            <a href="cards/2026-03-20/card-05.png" download="card-05.png" class="card-link" data-filename="card-05.png">

                <img src="cards/2026-03-20/card-06.png" alt="card-06.png" class="card-img">
            </a>
            </div>
        </section>
    <script>
    document.querySelectorAll('.card-link').forEach(link => {
        link.addEventListener('click', async (e) => {
            e.preventDefault();
            const url = link.href;
            const filename = link.dataset.filename;
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                URL.revokeObjectURL(a.href);
            } catch {
                window.open(url);
            }
        });
    });
    </script>
</body>
</html>
