name: Daily AI Threads

on:
  schedule:
    - cron: '30 15,21,1,5,9,13 * * *'  # KST 00:30,06:30,10:30,14:30,18:30,22:30 6회
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Seoul

jobs:
  post:
    name: 포스트 생성 + 포스팅
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout last30days skill
        uses: actions/checkout@v4
        with:
          repository: mvanhorn/last30days-skill
          path: .last30days-skill

      - name: Setup last30days lib path
        run: |
          mkdir -p ~/.claude/skills/last30days
          ln -s "$GITHUB_WORKSPACE/.last30days-skill/scripts" ~/.claude/skills/last30days/scripts

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yt-dlp
          pip install -r requirements.txt

      - name: Run AI Threads
        env:
          CONTENT_MODE: informational
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          TRUTHSOCIAL_TOKEN: ${{ secrets.TRUTHSOCIAL_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: $(date +%Y-%m-%d) 포스트"
          git push

  collect-insights:
    name: 성과 데이터 수집
    needs: post
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect insights
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python performance_tracker.py --days 7

      - name: Commit performance data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull --rebase origin master || true
          git add output/performance.jsonl
          git diff --staged --quiet || git commit -m "chore: $(date +%Y-%m-%d) 성과 수집"
          git push
