name: Daily AI Threads

on:
  schedule:
    - cron: '30 21 * * *'  # KST 06:30 1회/일 (비용 절감)
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Seoul

jobs:
  post:
    name: 포스트 생성 + 포스팅
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout last30days skill
        uses: actions/checkout@v4
        with:
          # Pinned to the last commit before the upstream scripts/ -> skills/ reorg
          # so social_collector's `from lib.*` imports keep resolving.
          repository: mvanhorn/last30days-skill
          ref: 4d6224f79aab743052d36248949ca03b24fded26
          path: .last30days-skill

      - name: Setup last30days lib path
        run: |
          mkdir -p ~/.claude/skills/last30days
          ln -s "$GITHUB_WORKSPACE/.last30days-skill/scripts" ~/.claude/skills/last30days/scripts

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yt-dlp
          pip install -r requirements.txt

      - name: Run AI Threads
        env:
          CONTENT_MODE: informational
          THREADS_LLM_BACKEND: anthropic_api
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          TRUTHSOCIAL_TOKEN: ${{ secrets.TRUTHSOCIAL_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: $(date +%Y-%m-%d) 포스트"
          git push
