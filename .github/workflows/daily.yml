name: Daily AI Threads

on:
  schedule:
    - cron: '0 22,0,2,4,6,8,10,12,14 * * *'  # KST 07~23시 2시간 간격
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Seoul

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout last30days skill
        uses: actions/checkout@v4
        with:
          repository: mvanhorn/last30days-skill
          path: .last30days-skill

      - name: Setup last30days lib path
        run: |
          mkdir -p ~/.claude/skills/last30days
          ln -s "$GITHUB_WORKSPACE/.last30days-skill/scripts" ~/.claude/skills/last30days/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Threads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          TRUTHSOCIAL_TOKEN: ${{ secrets.TRUTHSOCIAL_TOKEN }}
        run: python main.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: $(date +%Y-%m-%d) 포스트"
          git push
